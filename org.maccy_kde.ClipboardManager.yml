app-id: org.maccy_kde.ClipboardManager
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: maccy-kde
finish-args:
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --filesystem=xdg-config/autostart:create
  - --filesystem=xdg-data/maccy-kde:create
  - --filesystem=xdg-cache/maccy-kde:create
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: maccy-kde
    buildsystem: simple
    build-commands:
      - cargo build --release --locked
      - install -D -m 755 target/release/maccy-kde /app/bin/maccy-kde
    sources:
      - type: dir
        path: .
    build-options:
      build-args:
        - --share=network
